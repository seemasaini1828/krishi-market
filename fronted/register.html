<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
🌾 Krishi Market
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
</ul>

</nav>

<div class="form-container">

<h2 class="form-title">
Create Account
</h2>

<form id="registerForm">

<div class="form-group">
<label>Name</label>
<input
type="text"
id="name"
required>
</div>

<div class="form-group">
<label>Email</label>
<input
type="email"
id="email"
required>
</div>

<div class="form-group">
<label>Password</label>
<input
type="password"
id="password"
required>
</div>

<div class="form-group">

<label>User Type</label>

<select id="role">

<option value="customer">
Customer
</option>

<option value="farmer">
Farmer
</option>

</select>

</div>

<button
type="submit"
class="form-btn">

Register

</button>

</form>

</div>

<script src="js/auth.js"></script>

</body>

</html>
